<!DOCTYPE html>
<html>
<head>
    <title>Live Standings</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; padding: 20px; }
        .chart-area { 
            display: flex; justify-content: space-around; align-items: flex-end; 
            height: 350px; border-bottom: 3px solid #333; max-width: 800px; margin: 50px auto; 
        }
        .bar-group { display: flex; flex-direction: column; align-items: center; width: 100px; }
        .bar { width: 60px; background: #007bff; transition: height 0.5s; position: relative; border-radius: 5px 5px 0 0; }
        .vote-num { position: absolute; top: -25px; width: 100%; font-weight: bold; }
        .photo-circle { width: 60px; height: 60px; border-radius: 50%; border: 3px solid white; margin-top: 10px; overflow: hidden; background: #ddd; }
        .photo-circle img { width: 100%; height: 100%; object-fit: cover; }
        .label { font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>
    <h1>Real-Time Results</h1>
    <div class="chart-area">
        <div class="bar-group">
            <div id="barA" class="bar" style="background:#ff6384;"><span id="valA" class="vote-num">0</span></div>
            <div class="photo-circle"><img id="resImgA"></div>
            <div class="label">A</div>
        </div>
        <div class="bar-group">
            <div id="barB" class="bar" style="background:#36a2eb;"><span id="valB" class="vote-num">0</span></div>
            <div class="photo-circle"><img id="resImgB"></div>
            <div class="label">B</div>
        </div>
        <div class="bar-group">
            <div id="barC" class="bar" style="background:#ffce56;"><span id="valC" class="vote-num">0</span></div>
            <div class="photo-circle"><img id="resImgC"></div>
            <div class="label">C</div>
        </div>
    </div>

    <script>
        function updateResults() {
            const db = JSON.parse(localStorage.getItem('electionDB')) || { A: 0, B: 0, C: 0 };
            const max = Math.max(db.A, db.B, db.C, 1);
            const heightLimit = 280;

            // Update Bars and Text
            [['A', db.A], ['B', db.B], ['C', db.C]].forEach(item => {
                const h = (item[1] / max) * heightLimit;
                document.getElementById('bar' + item[0]).style.height = h + "px";
                document.getElementById('val' + item[0]).innerText = item[1];
                // Load Photos
                document.getElementById('resImg' + item[0]).src = localStorage.getItem('photo' + item[0]) || "";
            });
        }

        setInterval(updateResults, 1000);
        window.onload = updateResults;
    </script>
</body>
</html>
