<!DOCTYPE html>
<html>
<head>
    <title>Voting Booth</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #f8f9fa; padding: 20px; }
        .container { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 220px; }
        .photo-slot { width: 100%; height: 150px; background: #eee; border-radius: 10px; margin-bottom: 15px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; }
        .btn-vote { width: 100%; padding: 12px; border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; }
        .c1 { background: #ff6384; } .c2 { background: #36a2eb; } .c3 { background: #ffce56; }
        .admin-panel { margin-top: 50px; border-top: 2px dashed #ccc; padding: 20px; font-size: 12px; }
    </style>
</head>
<body>
    <h1>Hostel President</h1>
    <div class="container">
        <div class="card">
            <div class="photo-slot"><img id="imgA" src=""></div>
            <h3>Jonathan </h3>
            <button class="btn-vote c1" onclick="castVote('A')">VOTE A</button>
        </div>
        <div class="card">
            <div class="photo-slot"><img id="imgB" src=""></div>
            <h3>Henry </h3>
            <button class="btn-vote c2" onclick="castVote('B')">VOTE B</button>
        </div>
        <div class="card">
            <div class="photo-slot"><img id="imgC" src=""></div>
            <h3>Jacobson </h3>
            <button class="btn-vote c3" onclick="castVote('C')">VOTE C</button>
        </div>
    </div>

    <div class="admin-panel">
        <h3>Admin: Upload Photos</h3>
        A: <input type="file" onchange="uploadImg(this, 'photoA')"> | 
        B: <input type="file" onchange="uploadImg(this, 'photoB')"> | 
        C: <input type="file" onchange="uploadImg(this, 'photoC')">
    </div>

    <script>
        function castVote(candidate) {
            let db = JSON.parse(localStorage.getItem('electionDB')) || { A: 0, B: 0, C: 0 };
            db[candidate]++;
            localStorage.setItem('electionDB', JSON.stringify(db));
            alert("Vote recorded for " + candidate);
        }

        function uploadImg(input, key) {
            const reader = new FileReader();
            reader.onload = function(e) {
                localStorage.setItem(key, e.target.result);
                loadPhotos();
            }
            reader.readAsDataURL(input.files[0]);
        }

        function loadPhotos() {
            document.getElementById('imgA').src = localStorage.getItem('photoA') || "";
            document.getElementById('imgB').src = localStorage.getItem('photoB') || "";
            document.getElementById('imgC').src = localStorage.getItem('photoC') || "";
        }
        window.onload = loadPhotos;
    </script>
</body>
</html>
